<div class="w-full min-h-screen bg-[#EBF4F6] py-10 px-6">
  <div class="max-w-4xl mx-auto"> <header class="flex justify-between items-center mb-10">
      <div>
        <h1 class="text-3xl font-black text-[#09637E] uppercase tracking-tight">
          I Miei <span class="text-[#088395]">Veicoli</span>
        </h1>
      </div>
      <button (click)="tornaAllaDashboard()" class="bg-white text-[#09637E] border border-[#7AB2B2]/30 px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-sm hover:bg-[#09637E] hover:text-white transition-all">
        ← Torna alla Dashboard
      </button>
    </header>

    <div class="bg-white rounded-3xl shadow-xl border border-[#7AB2B2]/20 overflow-hidden">
      <div class="bg-[#09637E] px-8 py-4">
        <span class="text-white text-[10px] font-black uppercase tracking-[0.2em]">Elenco Mezzi</span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>
            <tr class="text-left border-b border-[#EBF4F6]">
              <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Veicolo</th>
              <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Targa</th>
              <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Azioni</th>
            </tr>
          </thead>
          
          <tbody class="divide-y divide-[#EBF4F6]">
            <tr *ngFor="let v of veicoliService.veicoli" class="hover:bg-[#EBF4F6]/30 transition-colors group">
              <td class="px-8 py-6">
                <div class="flex items-center gap-4">
                  <div class="bg-[#EBF4F6] p-3 rounded-xl text-[#09637E]">
                    <i class="bi bi-car-front-fill text-xl"></i>
                  </div>
                  <div>
                    <p class="font-black text-[#09637E] uppercase tracking-tight">{{ v.marca }}</p>
                    <p class="text-slate-400 text-xs font-bold">{{ v.modello }}</p>
                  </div>
                </div>
              </td>
              <td class="px-8 py-6">
                <span class="bg-white border-2 border-[#09637E]/10 text-[#09637E] px-4 py-1.5 rounded-lg font-mono font-black text-sm">
                  {{ v.targa }}
                </span>
              </td>
              <td class="px-8 py-6 text-right">
                <div class="flex justify-end gap-2">
                  <button class="p-2 hover:bg-[#088395]/10 text-[#088395] rounded-lg transition-colors">
                    <i class="bi bi-eye-fill text-lg"></i>
                  </button>
                  <button class="p-2 hover:bg-red-50 text-red-400 rounded-lg transition-colors">
                    <i class="bi bi-trash3 text-lg"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
