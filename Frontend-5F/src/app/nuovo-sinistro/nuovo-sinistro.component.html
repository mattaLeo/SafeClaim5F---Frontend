<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
    
    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-[#09637E] text-white">
      <h2 class="text-xl font-black uppercase tracking-tight">Nuova Pratica Sinistro</h2>
      <button (click)="close()" class="hover:rotate-90 transition-transform"><i class="bi bi-x-lg"></i></button>
    </div>

    <div class="p-8 overflow-y-auto">
      <form (ngSubmit)="submit()" class="flex flex-col gap-6">
        
        <div>
          <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">ID Automobilista</label>
          <input type="number" 
                 [(ngModel)]="formData.automobilista_id" 
                 name="automobilista_id" 
                 (input)="aggiornaVeicoli()"
                 class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-[#09637E] font-bold focus:border-[#088395] outline-none"
                 placeholder="Inserisci il tuo ID">
        </div>

        <div>
          <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Seleziona il tuo veicolo</label>
          <div class="grid grid-cols-2 gap-3">
            <div *ngFor="let v of veicoliService.veicoli" 
                 (click)="selectVeicolo(v.targa)" 
                 class="cursor-pointer p-4 rounded-xl border-2 transition-all"
                 [class.border-[#088395]]="formData.targa === v.targa"
                 [class.bg-[#EBF4F6]]="formData.targa === v.targa"
                 [class.border-slate-100]="formData.targa !== v.targa">
              <p class="text-xs font-black text-[#09637E]">{{ v.targa }}</p>
              <p class="text-[10px] text-slate-400">{{ v.modello }}</p>
            </div>
            
            <div *ngIf="veicoliService.veicoli.length === 0" class="col-span-2 text-center py-6 bg-slate-50 rounded-xl border border-dashed border-slate-200">
              <p class="text-[10px] text-slate-400 uppercase font-black">Nessun veicolo trovato per questo ID</p>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Data dell'evento</label>
          <input type="date" [(ngModel)]="formData.data_evento" name="data_evento"
                 class="w-full p-4 border border-slate-200 rounded-xl focus:border-[#088395] outline-none">
        </div>

        <div>
          <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Descrizione Sinistro</label>
          <textarea [(ngModel)]="formData.descrizione" name="descrizione" rows="3"
                    placeholder="Descrivi brevemente l'accaduto..."
                    class="w-full p-4 border border-slate-200 rounded-xl focus:border-[#088395] outline-none"></textarea>
        </div>

        <div *ngIf="errorMessage" class="p-3 bg-red-50 text-red-600 text-xs font-bold rounded-lg border border-red-100">{{ errorMessage }}</div>
        <div *ngIf="successMessage" class="p-3 bg-green-50 text-green-600 text-xs font-bold rounded-lg border border-green-100">{{ successMessage }}</div>

        <div class="flex gap-4 pt-4">
          <button type="button" (click)="close()" class="flex-1 py-4 text-slate-400 font-black uppercase text-[10px] tracking-widest hover:bg-slate-50 rounded-xl transition-all">Annulla</button>
          <button type="submit" [disabled]="loading" class="flex-1 py-4 bg-[#09637E] text-white font-black uppercase text-[10px] tracking-widest rounded-xl shadow-lg hover:bg-[#088395] transition-all disabled:opacity-50">
            {{ loading ? 'Invio in corso...' : 'Invia Pratica' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
